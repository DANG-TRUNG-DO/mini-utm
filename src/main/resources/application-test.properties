# Datasource properties are supplied by Testcontainers in integration tests.
spring.jpa.show-sql=false
management.endpoints.web.exposure.include=health,info
mini-utm.telemetry.retention.enabled=false
mini-utm.telemetry.retention.days=30
mini-utm.telemetry.retention.batch-size=2
mini-utm.alert.low-battery.threshold-percent=20
mini-utm.alert.low-battery.recovery-threshold-percent=25
