spring.application.name=mini-utm
spring.profiles.default=local
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.flyway.enabled=true

mini-utm.telemetry.retention.enabled=${TELEMETRY_RETENTION_ENABLED:true}
mini-utm.telemetry.retention.days=${TELEMETRY_RETENTION_DAYS:90}
mini-utm.telemetry.retention.batch-size=${TELEMETRY_RETENTION_BATCH_SIZE:1000}
mini-utm.telemetry.retention.cron=${TELEMETRY_RETENTION_CRON:0 0 3 * * *}

mini-utm.realtime.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

mini-utm.alert.low-battery.threshold-percent=${ALERT_LOW_BATTERY_THRESHOLD:20}
mini-utm.alert.low-battery.recovery-threshold-percent=${ALERT_LOW_BATTERY_RECOVERY_THRESHOLD:25}
mini-utm.alert.telemetry-loss.enabled=${ALERT_TELEMETRY_LOSS_ENABLED:true}
mini-utm.alert.telemetry-loss.timeout=${ALERT_TELEMETRY_LOSS_TIMEOUT:60s}
mini-utm.alert.telemetry-loss.scan-interval=${ALERT_TELEMETRY_LOSS_SCAN_INTERVAL:30s}
mini-utm.alert.route-deviation.corridor-width-meters=${ALERT_ROUTE_DEVIATION_CORRIDOR_METERS:100}
